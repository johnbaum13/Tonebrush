<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tonebrush</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --panel:      #16181d;
    --panel-2:    #1e2128;
    --card:       #23272f;
    --card-hover: #282d37;
    --ink:        #ece7d9;
    --ink-dim:    #888d98;
    --signal:     #ff5e3a;   /* coral — "active/rec" accent, used sparingly */
    --phosphor:   #62d4c4;   /* teal — active/online state */
    --line:       rgba(236,231,217,0.09);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--panel);
    color: var(--ink);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100vh;
    padding: clamp(20px, 5vw, 56px);
  }

  .wrap { max-width: 920px; margin: 0 auto; }

  /* ---------- header / console strip ---------- */
  header {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    padding: clamp(20px, 4vw, 32px);
    margin-bottom: 28px;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-dim);
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 16px;
  }

  .led {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--phosphor);
    box-shadow: 0 0 8px var(--phosphor);
    animation: pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  h1 {
    font-size: clamp(32px, 7vw, 54px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.02;
  }
  h1 .mark { color: var(--signal); }

  .tagline {
    color: var(--ink-dim);
    margin-top: 12px;
    max-width: 44ch;
    font-size: 15px;
  }

  /* signature element: a thin signal-meter row */
  .meter {
    display: flex;
    gap: 4px;
    margin-top: 22px;
    align-items: flex-end;
    height: 18px;
  }
  .meter span {
    width: 4px;
    background: var(--line);
    border-radius: 1px;
    animation: bounce 1.8s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { height: 4px;  background: var(--line); }
    50%      { height: 16px; background: var(--phosphor); }
  }

  /* ---------- grid ---------- */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin: 0 4px 14px;
    display: flex;
    justify-content: space-between;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 22px 22px 18px;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
  }
  /* the left "channel strip" that lights up on hover */
  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--line);
    transition: background 0.18s ease, box-shadow 0.18s ease;
  }
  .card:hover, .card:focus-visible {
    background: var(--card-hover);
    border-color: rgba(98,212,196,0.4);
    transform: translateY(-2px);
    outline: none;
  }
  .card:hover::before, .card:focus-visible::before {
    background: var(--phosphor);
    box-shadow: 0 0 12px var(--phosphor);
  }

  .card-name { font-size: 19px; font-weight: 500; letter-spacing: -0.01em; }
  .card-blurb { color: var(--ink-dim); font-size: 13.5px; margin-top: 7px; flex: 1; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-dim);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 3px 7px;
  }
  .tag.device { color: var(--signal); border-color: rgba(255,94,58,0.4); }

  .launch {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
  }
  .launch .go { color: var(--ink); }
  .launch .arrow { transition: transform 0.18s ease; color: var(--phosphor); }
  .card:hover .arrow, .card:focus-visible .arrow { transform: translateX(4px); }
  .launch .newtab { color: var(--ink-dim); font-size: 10px; }

  footer {
    margin-top: 36px;
    padding: 0 4px;
    color: var(--ink-dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    line-height: 1.7;
  }

  @media (prefers-reduced-motion: reduce) {
    .led, .meter span { animation: none; }
    .led { opacity: 1; }
    .meter span { height: 10px; background: var(--phosphor); }
    .card, .arrow { transition: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow"><span class="led"></span> Online · Bushwick, NYC</div>
    <h1>The <span class="mark">Tonebrush</span></h1>
    <p class="tagline">Browser-based instruments and tools. Pick a module to open it.</p>
    <div class="meter" id="meter" aria-hidden="true"></div>
  </header>

  <div class="section-label"><span>Modules</span><span id="count"></span></div>
  <div class="grid" id="grid"></div>

  <footer>
    Built and hosted on GitHub Pages. Tools marked <span style="color:var(--signal)">MIC / MIDI</span> open in a new tab for device access.
  </footer>

</div>

<script>
  /* =========================================================
     EDIT THIS LIST TO ADD / REMOVE / RENAME TOOLS.
     - file:   the .html filename in this repo (relative link)
     - newTab: true for anything needing mic or a MIDI device,
               so it opens full-screen with full permissions
     ========================================================= */
  const TOOLS = [
    {
      name: "Sonic Brush",
      file: "sonic-brush.html",
      blurb: "Live mic-input audio painter with motion models and recording.",
      tags: ["CANVAS", "MIC"],
      newTab: true
    },
    {
      name: "MIDI Monet",
      file: "midi-monet.html",
      blurb: "Generative painting driven by a MIDI controller.",
      tags: ["CANVAS", "MIDI"],
      newTab: true
    },
    {
      name: "MIDI DaVinci",
      file: "midi-davinci.html",
      blurb: "Turtle-cursor drawing with a built-in drum machine and synth.",
      tags: ["CANVAS", "MIDI", "AUDIO"],
      newTab: true
    }
  ];

  // ---- render ----
  const grid = document.getElementById('grid');
  TOOLS.forEach(t => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = t.file;
    if (t.newTab) { a.target = '_blank'; a.rel = 'noopener'; }

    const isDevice = t.tags.some(x => x === 'MIC' || x === 'MIDI');
    const tagsHTML = t.tags.map(x => {
      const dev = (x === 'MIC' || x === 'MIDI') ? ' device' : '';
      return `<span class="tag${dev}">${x}</span>`;
    }).join('');

    a.innerHTML = `
      <div class="card-name">${t.name}</div>
      <div class="card-blurb">${t.blurb}</div>
      <div class="tags">${tagsHTML}</div>
      <div class="launch">
        <span class="go">Open <span class="arrow">→</span></span>
        ${t.newTab ? '<span class="newtab">↗ new tab</span>' : ''}
      </div>`;
    grid.appendChild(a);
  });

  document.getElementById('count').textContent =
    String(TOOLS.length).padStart(2, '0');

  // signal meter bars
  const meter = document.getElementById('meter');
  for (let i = 0; i < 24; i++) {
    const s = document.createElement('span');
    s.style.animationDelay = (i * 0.07) + 's';
    meter.appendChild(s);
  }
</script>
</body>
</html>
